{% extends "base.html" %}
{% block content %}

<h2 style="color:white;">📌 Gastos Fijos</h2>

<!-- ALERTAS -->
{% for a in alertas %}
<div class="alert alert-warning">
    ⚠️ {{ a[0] }} vence en {{ a[1] }} días
</div>
{% endfor %}

<!-- FORM -->
<div class="form-box mb-4">
    <form action="{{ url_for('add_gasto_fijo') }}" method="POST">

        <input name="nombre" placeholder="Nombre (Ej: Arriendo)" class="form-control mb-2">

        <select name="categoria" class="form-control mb-2">
            <option>Vivienda</option>
            <option>Transporte</option>
            <option>Servicios</option>
            <option>Suscripciones</option>
            <option>Otro</option>
        </select>

        <input name="monto" placeholder="Monto" class="form-control mb-2">

        <input type="date" name="fecha_pago" class="form-control mb-2">

        <button class="btn btn-primary w-100">Agregar</button>

    </form>
</div>

<!-- LISTA -->
<table class="table table-dark">
<tr>
    <th>Nombre</th>
    <th>Categoría</th>
    <th>Monto</th>
    <th>Fecha de pago</th>
</tr>

{% for g in gastos %}
<tr>
    <td>{{ g[1] }}</td>
    <td>{{ g[2] }}</td>
    <td>${{ g[3]|money }}</td>
    <td>{{ g[4] }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
