<!DOCTYPE html>
<html>
<head>
<title>Registro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body class="login-body">

<div class="login-container">

    <div class="login-box">
        <h2>📝 Crear Cuenta</h2>
        <p class="text-muted">Regístrate para comenzar</p>

        <form method="POST">
            <input name="nombre" class="form-control mb-3" placeholder="Nombre">
            <input name="email" class="form-control mb-3" placeholder="Correo">
            <input name="password" type="password" class="form-control mb-3" placeholder="Contraseña">

            <button class="btn btn-success w-100">Registrarse</button>
        </form>

        <p class="mt-3 text-center">
            ¿Ya tienes cuenta? <a href="/">Inicia sesión</a>
        </p>
    </div>

</div>

</body>
</html>
