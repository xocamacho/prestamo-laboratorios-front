<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema de Préstamo de Laboratorio - UPB</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="navbar-brand">
      <img src="assets/images/LOGOUPB.jpg" alt="Logo UPB" class="logo-img" />
      <div class="brand-divider"></div>
      <div class="brand-text">
        <span class="brand-name">Universidad</span>
        <span class="brand-name">Pontificia</span>
        <span class="brand-name">Bolivariana</span>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main-bg">
    <div class="login-card">

      <!-- Card Header -->
      <div class="card-header">
        <img src="assets/images/LOGOUPB.jpg" alt="Logo UPB" class="card-shield" />
        <p class="card-subtitle">Sistema de Préstamo de Laboratorio</p>
      </div>

      <!-- Login Form -->
      <div class="card-body">
        <h2 class="form-title">Iniciar sesión</h2>

        <!-- Mensaje de error -->
        <div id="error-msg" style="
          display:none;
          background:#FFF0F5;
          border:1px solid #F9A8D4;
          color:#9D174D;
          border-radius:8px;
          padding:10px 14px;
          font-size:13px;
          font-weight:600;
          margin-bottom:16px;
          align-items:center;
          gap:8px;
        ">
          <i class="fa-solid fa-circle-exclamation"></i>
          <span id="error-text">Correo o contraseña incorrectos.</span>
        </div>

        <form id="loginForm" novalidate onsubmit="handleLogin(event)">

          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <div class="input-wrapper">
              <span class="input-icon"><i class="fa-regular fa-envelope"></i></span>
              <input type="email" id="email" name="email" placeholder="Correo electrónico" autocomplete="email" required />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <div class="input-wrapper">
              <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
              <input type="password" id="password" name="password" placeholder="Contraseña" autocomplete="current-password" required />
              <button type="button" id="toggle-password" style="
                position:absolute;
                right:14px;
                background:none;
                border:none;
                cursor:pointer;
                color:#AAAABF;
                font-size:15px;
                padding:0;
                display:flex;
                align-items:center;
              ">
                <i class="fa-regular fa-eye" id="eye-icon"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-login">Iniciar sesión</button>

          <div class="forgot-link">
            <a href="#" onclick="mostrarRecuperar(event)">¿Olvidaste tu contraseña?</a>
          </div>

        </form>
      </div>

    </div>
  </main>

  <!-- Modal recuperar contraseña -->
  <div id="modal-recuperar" style="
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    z-index:999;
    align-items:center;
    justify-content:center;
  ">
    <div style="
      background:#fff;
      border-radius:16px;
      padding:32px;
      width:100%;
      max-width:400px;
      margin:16px;
      box-shadow:0 20px 60px rgba(0,0,0,0.2);
    ">
      <h3 style="font-size:20px;font-weight:800;color:#1A1A2E;margin-bottom:8px;">
        Recuperar contraseña
      </h3>
      <p style="font-size:13px;color:#6B6B85;margin-bottom:20px;">
        Ingresa tu correo y te enviaremos las instrucciones.
      </p>

      <div id="recuperar-exito" style="
        display:none;
        background:#F0FDF4;
        border:1px solid #86EFAC;
        color:#166534;
        border-radius:8px;
        padding:10px 14px;
        font-size:13px;
        font-weight:600;
        margin-bottom:16px;
      ">
        ✓ Correo enviado. Revisa tu bandeja de entrada.
      </div>

      <label style="display:block;font-size:13px;font-weight:700;color:#1A1A2E;margin-bottom:6px;">
        Correo electrónico
      </label>
      <div style="position:relative;margin-bottom:16px;">
        <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#AAAABF;font-size:14px;">
          <i class="fa-regular fa-envelope"></i>
        </span>
        <input
          type="email"
          id="recuperar-email"
          placeholder="Correo electrónico"
          style="
            width:100%;
            height:48px;
            border:1.5px solid #E2E2EE;
            border-radius:10px;
            padding:0 14px 0 40px;
            font-family:'Nunito',sans-serif;
            font-size:14px;
            color:#1A1A2E;
            background:#F9F9FC;
            outline:none;
          "
        />
      </div>

      <button onclick="enviarRecuperar()" style="
        width:100%;
        height:48px;
        border:none;
        border-radius:10px;
        background:linear-gradient(135deg,#6B1F7C,#D91E7A);
        color:#fff;
        font-family:'Nunito',sans-serif;
        font-size:15px;
        font-weight:700;
        cursor:pointer;
        margin-bottom:10px;
      ">
        Enviar instrucciones
      </button>

      <button onclick="cerrarRecuperar()" style="
        width:100%;
        height:40px;
        border:1.5px solid #E2E2EE;
        border-radius:10px;
        background:#fff;
        color:#6B6B85;
        font-family:'Nunito',sans-serif;
        font-size:14px;
        font-weight:600;
        cursor:pointer;
      ">
        Cancelar
      </button>
    </div>
  </div>

  <script>
    // Usuarios de prueba con roles
    const usuarios = [
      {
        email: 'admin@upb.edu.co',
        password: '1234',
        nombre: 'Jairo Peña Fuentes',
        rol: 'admin',
        modulo: null
      },
      {
        email: 'profesor@upb.edu.co',
        password: '1234',
        nombre: 'Oscar Santoya',
        rol: 'profesor',
        modulo: null
      },
      {
        email: 'usuario@upb.edu.co',
        password: '1234',
        nombre: 'María García',
        rol: 'usuario',
        modulo: null
      }
    ];

    function handleLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorDiv = document.getElementById('error-msg');

      errorDiv.style.display = 'none';

      if (!email || !password) {
        mostrarError('Por favor completa todos los campos.');
        return;
      }

      const usuario = usuarios.find(u => u.email === email && u.password === password);

      if (usuario) {
        sessionStorage.setItem('usuario', JSON.stringify(usuario));
        window.location.href = 'seleccion-modulo.html';
      } else {
        mostrarError('Correo o contraseña incorrectos.');
      }
    }

    function mostrarError(msg) {
      const errorDiv = document.getElementById('error-msg');
      document.getElementById('error-text').textContent = msg;
      errorDiv.style.display = 'flex';
    }

    // Ojito mostrar/ocultar contraseña
    document.getElementById('toggle-password').addEventListener('click', function() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
        this.style.color = '#6B1F7C';
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
        this.style.color = '#AAAABF';
      }
    });

    function mostrarRecuperar(e) {
      e.preventDefault();
      const modal = document.getElementById('modal-recuperar');
      modal.style.display = 'flex';
      document.getElementById('recuperar-exito').style.display = 'none';
      document.getElementById('recuperar-email').value = '';
    }

    function cerrarRecuperar() {
      document.getElementById('modal-recuperar').style.display = 'none';
    }

    function enviarRecuperar() {
      const email = document.getElementById('recuperar-email').value.trim();
      const input = document.getElementById('recuperar-email');
      if (!email) {
        input.style.borderColor = '#F9A8D4';
        return;
      }
      input.style.borderColor = '#E2E2EE';
      document.getElementById('recuperar-exito').style.display = 'block';
      setTimeout(() => cerrarRecuperar(), 2500);
    }
  </script>

</body>
</html>
